<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - INFO PURGE 24</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 50, 50, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ff4444;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        h1 {
            font-family: 'Orbitron', monospace;
            color: #ff4444;
            font-size: 2em;
        }
        
        button {
            background: #ff4444;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-family: 'Orbitron', monospace;
        }
        
        button:hover {
            background: #cc0000;
        }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(0,0,0,0.8);
            border: 1px solid #ff4444;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        
        .pin-input {
            font-size: 32px;
            text-align: center;
            letter-spacing: 10px;
            width: 200px;
            margin: 20px auto;
            background: black;
            border: 1px solid #ff4444;
            color: white;
            padding: 10px;
        }
        
        .clan-card {
            background: rgba(255,68,68,0.05);
            border: 1px solid rgba(255,68,68,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        input, textarea {
            background: black;
            border: 1px solid #ff4444;
            padding: 10px;
            color: white;
            border-radius: 8px;
            margin: 5px;
        }
        
        .current-scores {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .current-scores span {
            background: rgba(255,68,68,0.2);
            padding: 5px 10px;
            border-radius: 8px;
        }
        
        .delete-btn {
            background: #cc0000;
        }
        
        .error {
            color: #ff8888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="login-box">
            <h1>🔐 JOYBOY ADMIN</h1>
            <p>Entrez votre code</p>
            <input type="password" id="pinCode" class="pin-input" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="****">
            <button onclick="checkPin()">Se connecter</button>
            <div id="loginError" class="error"></div>
            <a href="index.html" style="color:#ff4444; display:block; margin-top:20px;">← Retour au site</a>
        </div>

        <div id="adminPanel" style="display:none;">
            <header>
                <h1>⚡ ADMIN INFO PURGE 24 ⚡</h1>
                <p>Bienvenue Joyboy</p>
                <button onclick="logout()">🚪 Déconnexion</button>
                <a href="index.html"><button>🏠 Voir le site</button></a>
            </header>

            <h2 style="color:#ff4444; margin:20px 0 10px;">📋 GESTION DES CLANS</h2>
            <div id="clansList"></div>

            <h2 style="color:#ff4444; margin:20px 0 10px;">⭐ AJOUTER DES POINTS</h2>
            <div id="scoreInputs"></div>
        </div>
    </div>

    <script>
        const ADMIN_PIN = "2007";
        const STORAGE_KEY = "infopurge24_data";
        
        let currentData = { clans: [], forum: [] };
        
        function checkPin() {
            const enteredPin = document.getElementById('pinCode').value;
            if(enteredPin === ADMIN_PIN) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginError').innerText = '❌ Code incorrect';
                document.getElementById('pinCode').value = '';
            }
        }
        
        if(localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadData();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }
        
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) {
                currentData = JSON.parse(saved);
            }
            if(!currentData.clans) currentData.clans = [];
            if(!currentData.forum) currentData.forum = [];
            displayAdmin();
        }
        
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
            displayAdmin();
        }
        
        function displayAdmin() {
            // Liste des clans avec bouton supprimer
            const clansContainer = document.getElementById('clansList');
            if(currentData.clans.length === 0) {
                clansContainer.innerHTML = '<p>Aucun clan enregistré.</p>';
            } else {
                clansContainer.innerHTML = currentData.clans.map(clan => `
                    <div class="clan-card">
                        <strong>⚔️ ${escapeHtml(clan.name)}</strong> - Chef: ${escapeHtml(clan.leader)}<br>
                        📝 ${escapeHtml(clan.description)}<br>
                        📅 Créé le: ${new Date(clan.created_at).toLocaleDateString()}<br>
                        <button onclick="deleteClan(${clan.id})" class="delete-btn">🗑️ SUPPRIMER CE CLAN</button>
                    </div>
                `).join('');
            }
            
            // Ajout de points
            const scoreContainer = document.getElementById('scoreInputs');
            if(currentData.clans.length === 0) {
                scoreContainer.innerHTML = '<p>Créez d\'abord des clans.</p>';
            } else {
                scoreContainer.innerHTML = currentData.clans.map(clan => `
                    <div class="clan-card">
                        <strong>⚔️ ${escapeHtml(clan.name)}</strong>
                        <div class="current-scores">
                            <span>📅 SEMAINE: ${clan.score_week || 0} pts</span>
                            <span>📆 MOIS: ${clan.score_month || 0} pts</span>
                            <span>🗓️ ANNÉE: ${clan.score_year || 0} pts</span>
                        </div>
                        <div style="margin-top:10px;">
                            <input type="number" id="points_${clan.id}" placeholder="Points à ajouter" style="width:150px;">
                            <button onclick="addPoints(${clan.id})">➕ AJOUTER AUX 3 CLASSEMENTS</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function deleteClan(id) {
            const clan = currentData.clans.find(c => c.id === id);
            if(confirm(`Supprimer "${clan.name}" du classement ?`)) {
                currentData.clans = currentData.clans.filter(c => c.id !== id);
                saveData();
                alert(`✅ "${clan.name}" supprimé.`);
            }
        }
        
        function addPoints(id) {
            const input = document.getElementById(`points_${id}`);
            const points = parseInt(input.value);
            if(!isNaN(points) && points > 0) {
                const clan = currentData.clans.find(c => c.id === id);
                if(clan) {
                    clan.score_week = (clan.score_week || 0) + points;
                    clan.score_month = (clan.score_month || 0) + points;
                    clan.score_year = (clan.score_year || 0) + points;
                    saveData();
                    alert(`✅ ${points} points ajoutés à ${clan.name} dans les 3 classements !`);
                }
                input.value = '';
            } else {
                alert('❌ Entrez un nombre valide');
            }
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
