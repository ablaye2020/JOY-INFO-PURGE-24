</head>
<body>
    <div class="container">
        <a href="admin.html" class="admin-link">⚡ JOYBOY ADMIN</a>
        <div class="music-control" onclick="toggleMusic()" id="musicBtn">🎵</div>
        
        <header>
            <div class="live-badge">🔴 LIVE</div>
            <h1>⚡ INFO PURGE 24 ⚡</h1>
            <div class="citation">"Le respect ne se demande pas, il s'impose" - Joyboy</div>
            <nav>
                <button onclick="showSection('ranking')">🏆 CLASSEMENT</button>
                <button onclick="showSection('forum')">💬 FORUM PURGE</button>
            </nav>
        </header>

        <!-- Section Classement -->
        <div id="ranking" class="section active">
            <h2>🏆 CLASSEMENT DES CLANS</h2>
            <button class="refresh-btn" onclick="loadData()">🔄 RAFRAÎCHIR</button>
            <div class="ranking-tabs">
                <div class="ranking-tab active" onclick="showRankingPeriod('week')">📅 SEMAINE</div>
                <div class="ranking-tab" onclick="showRankingPeriod('month')">📆 MOIS</div>
                <div class="ranking-tab" onclick="showRankingPeriod('year')">🗓️ ANNÉE</div>
            </div>
            <div id="rankingList">
                <div style="text-align:center; padding:50px;">⏳ Chargement des données...</div>
            </div>
        </div>

        <!-- Section Forum -->
        <div id="forum" class="section">
            <h2>💬 FORUM PURGE 24</h2>
            <button class="refresh-btn" onclick="loadData()">🔄 RAFRAÎCHIR</button>
            <form id="forumForm">
                <input type="text" id="authorName" placeholder="Votre pseudo" required>
                <textarea id="forumMessage" placeholder="Votre message" rows="3" required></textarea>
                <button type="submit">📢 PUBLIER</button>
            </form>
            <div id="forumMessages">
                <div style="text-align:center; padding:50px;">⏳ Chargement...</div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = "infopurge24_data";
        let currentRankingPeriod = 'week';
        let backgroundMusic = null;
        let musicPlaying = false;
        let globalData = {
            clans: [],
            forum: []
        };
        
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                globalData = JSON.parse(saved);
            }
            if (!globalData.clans) globalData.clans = [];
            if (!globalData.forum) globalData.forum = [];
            
            updateRanking();
            updateForum();
        }
        
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(globalData));
        }
        
        function updateRanking() {
            let clans = [...globalData.clans];
            
            if (currentRankingPeriod === 'week') {
                clans.sort((a,b) => (b.score_week || 0) - (a.score_week || 0));
            } else if (currentRankingPeriod === 'month') {
                clans.sort((a,b) => (b.score_month || 0) - (a.score_month || 0));
            } else {
                clans.sort((a,b) => (b.score_year || 0) - (a.score_year || 0));
            }
            
            const container = document.getElementById('rankingList');
            if (clans.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px;">🏆 Aucun clan enregistré pour le moment.</div>';
                return;
            }
            
            let periodLabel = currentRankingPeriod === 'week' ? 'POINTS SEMAINE' : (currentRankingPeriod === 'month' ? 'POINTS MOIS' : 'POINTS ANNÉE');
            
            container.innerHTML = clans.map((clan, index) => {
                let score = currentRankingPeriod === 'week' ? (clan.score_week || 0) : 
                           (currentRankingPeriod === 'month' ? (clan.score_month || 0) : (clan.score_year || 0));
                return `
                    <div class="ranking-item">
                        <span class="ranking-number">#${index+1}</span>
                        <span class="ranking-name">⚔️ ${escapeHtml(clan.name)}</span>
                        <span class="ranking-leader">👑 ${escapeHtml(clan.leader)}</span>
                        <span class="ranking-score">⭐ ${score} ${periodLabel}</span>
                        <button class="clan-like-btn" onclick="likeClan(${clan.id})">❤️ ${clan.likes || 0} likes</button>
                    </div>
                `;
            }).join('');
        }
        
        function likeClan(id) {
            const clan = globalData.clans.find(c => c.id === id);
            if (clan) {
                clan.likes = (clan.likes || 0) + 1;
                saveData();
                updateRanking();
                playSound('ding');
                showTempMessage("❤️ Vous avez liké le clan " + clan.name + " !");
            }
        }
        
        function showTempMessage(msg) {
            const tempDiv = document.createElement('div');
            tempDiv.style.cssText = 'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#ff4444; color:white; padding:10px 20px; border-radius:30px; z-index:1000; animation:fadeOut 2s ease forwards; font-family:Orbitron;';
            tempDiv.innerHTML = msg;
            document.body.appendChild(tempDiv);
            setTimeout(() => {
                tempDiv.remove();
            }, 2000);
        }
        
        function updateForum() {
            const forum = globalData.forum || [];
            const container = document.getElementById('forumMessages');
            if (forum.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px;">💬 Soyez le premier à commenter !</div>';
                return;
            }
            container.innerHTML = forum.map(msg => `
                <div class="message">
                    <strong>🔥 ${escapeHtml(msg.author)}</strong> <small>${msg.date}</small>
                    <p style="margin-top:8px;">${escapeHtml(msg.message)}</p>
                    <button class="like-btn" onclick="likeMessage(${msg.id})">❤️ ${msg.likes || 0} likes</button>
                </div>
            `).join('');
        }
        
        function likeMessage(id) {
            const msg = globalData.forum.find(m => m.id == id);
            if (msg) {
                msg.likes = (msg.likes || 0) + 1;
                saveData();
                updateForum();
                playSound('ding');
            }
        }
        
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                gainNode.gain.value = 0.2;
                if(type === 'ding') {
                    oscillator.frequency.value = 880;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                }
                setTimeout(() => {
                    oscillator.stop();
                    audioContext.close();
                }, 300);
            } catch(e) {}
        }
        
        function initMusic() {
            try {
                backgroundMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
                backgroundMusic.loop = true;
                backgroundMusic.volume = 0.15;
            } catch(e) {}
        }
        
        function toggleMusic() {
            if(!backgroundMusic) initMusic();
            if(musicPlaying) {
                backgroundMusic.pause();
                musicPlaying = false;
                document.getElementById('musicBtn').innerHTML = '🎵';
            } else {
                backgroundMusic.play().catch(e => console.log("Auto-play bloqué"));
                musicPlaying = true;
                document.getElementById('musicBtn').innerHTML = '🎵🔊';
            }
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            if(sectionId === 'ranking') updateRanking();
            if(sectionId === 'forum') updateForum();
        }
        
        function showRankingPeriod(period) {
            currentRankingPeriod = period;
            document.querySelectorAll('.ranking-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            updateRanking();
        }
        
        document.getElementById('forumForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const newMsg = {
                id: Date.now(),
                author: document.getElementById('authorName').value,
                message: document.getElementById('forumMessage').value,
                likes: 0,
                date: new Date().toLocaleString()
            };
            globalData.forum.unshift(newMsg);
            saveData();
            playSound('ding');
            updateForum();
            e.target.reset();
        });
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        loadData();
        initMusic();
        setInterval(() => { loadData(); }, 10000);
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                70% { opacity: 1; }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
